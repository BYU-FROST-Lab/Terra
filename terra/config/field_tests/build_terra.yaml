data_folder: /ros2_bags/metric_data_0.5s/synced/rvpark_v4_1_23_26
output_folder: /ros2_bags/metric_data_0.5s/synced/rvpark_v4_1_23_26/output/1_cam
save_average_embeddings: true
debug: false
cam2point_dist_threshold: 20.0 # [m] same as in msmap.yaml

## Terrain params
terrain_classes: ["leaves", "road", "sidewalk", "gravel", "dirt", "grass", "water"] # must match yolo class names & ordering
terrain_threshold: 0.90

## GVD params
og_resolution: 0.4 # Grid cell size in meters [m/cell] (should match LIO-SAM discretization (mappingSurfLeafSize))
max_iterations: 10 # max_itr for GVD floodfill technique
max_deviation: 2.0 # [m]
max_distance: 5.0 # [m]

## Terra params
z_offset_viz: 50.0 # [m]
z_offset_lidar: -2.5 # [m] dist from LiDAR to ground (negative-z means below LiDAR)
cossim_weight_ratio: 100.0
dbscan_params:
  eps: 1.0
  min_samples: 4
search_radius: 2.5
alpha: 0.25
## Region params
region_method: "spectral" # options: ["agglomerative", "spectral"]
## Agglomerative params
agg_hierarchical_distances: [50, 100, 200, 400] # [m]
## Hierarchical Spectral params
spec_min_graph_area: 10000 # [m^2]
spec_max_semantic_diff: 0.45 # cos_sim difference