## Processing parameters
data_folder: /docker_ros2_ws/src/oasis2/data/hope_campground_11_3_2025 #utah_lake_park_p1_11_6_2025
output_folder: /docker_ros2_ws/src/oasis2/data/hope_campground_11_3_2025/output
num_cams: 1
debug: false
continue_processing: false
save_step_size: 500
unaligned_threshold: 0.5 # seconds

## Camera intrinsics
cam_K:  [457.978759765625, 0.0, 387.35205078125, 
        0.0, 457.719482421875, 240.11021423339844, 
        0.0, 0.0, 1.0] # 768 x 480

## YOLOE Terrain Prompts
use_yoloe: true
terrain_prompts:
  - "sidewalk or asphalt or road"
  - "dirt or grass or gravel"
  - "water"
yolo_conf_threshold: 0.01

## MS Map parameters
match_threshold: 0.9
use_dbscan: true
dbscan_eps: 2.0
dbscan_min_samples: 5
cam2point_dist_threshold: 20.0 # [m]
cam_axis: ['-x']  # ['+x', '-x', '+y', '-y']
