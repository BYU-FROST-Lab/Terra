save_metric_data_multicam_rate:
  ros__parameters:
    rosbag_path: /ros2_bags/nunns_park_p2_10_15_2025
    lidar_topic: /lio_sam/deskew/cloud_deskewed
    save_folder: /ros2_bags/metric_data_0.5s/synced/nunns_park_p2_10_15_25
    save_period: 1.0 # [sec] between saves (true_save_time = save_period * rosbag_rate)
    num_cameras: 3
    camera1_topic: /oak_d_lr_forward/rgb/image_raw
    camera2_topic: /oak_d_lr_left/rgb/image_raw
    camera3_topic: /oak_d_lr_right/rgb/image_raw

    # extrinsic_transforms
    publish_extrinsics: true
    lidar_to_camera1:
      translation: [ -0.17, -0.10, 0.14 ] # x, y, z in meters
      rotation_quaternion: [ 0.53755715, 0.53701548, -0.45942828, 0.45996995] # qx, qy, qz, qw (L to Cam)
      parent_frame:  oak_d_lr_forward_rgb_camera_frame
      child_frame: os_lidar
    lidar_to_camera2:
      translation: [ -0.01, -0.08, -0.28] # x, y, z in meters
      rotation_quaternion: [-0.00369807, 0.70833014, -0.70586728, -0.00247472] # qx, qy, qz, qw (L to Cam)
      parent_frame:  oak_d_lr_left_rgb_camera_frame
      child_frame: os_lidar
    lidar_to_camera3:
      translation: [ -0.10, -0.08, -0.33 ] # x, y, z in meters
      rotation_quaternion: [ 0.70525074, -0.00184635, -0.00185604,  0.70895313] # qx, qy, qz, qw (L to Cam)
      parent_frame:  oak_d_lr_right_rgb_camera_frame
      child_frame: os_lidar