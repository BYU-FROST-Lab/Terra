save_metric_data_multicam_rate:
  ros__parameters:
    rosbag_path: /ros2_bags/nunns_park_p2_10_15_2025
    lidar_topic: /lio_sam/deskew/cloud_deskewed
    save_folder: /ros2_bags/metric_data_0.5s/synced/nunns_park_p2_10_15_2025
    save_period: 1.0 # [sec] between saves
    num_cameras: 3
    camera1_topic: /oak_d_lr_forward/rgb/image_raw
    camera2_topic: /oak_d_lr_left/rgb/image_raw
    camera3_topic: /oak_d_lr_right/rgb/image_raw

    # extrinsic_transforms
    publish_extrinsics: true
    lidar_to_camera1:
      translation: [ -0.06, -0.09, 0.22 ] # x, y, z in meters
      rotation_quaternion: [ 0.52890361,  0.52932322, -0.46491918,  0.47321038] # qx, qy, qz, qw (L to Cam)
      parent_frame:  oak_d_lr_forward_rgb_camera_frame
      child_frame: os_lidar
    lidar_to_camera2:
      translation: [ 0.11, -0.14, -0.31] # x, y, z in meters
      rotation_quaternion: [-0.00247682, -0.70214875,  0.71202494, -0.00121687] # qx, qy, qz, qw (L to Cam)
      parent_frame:  oak_d_lr_left_rgb_camera_frame
      child_frame: os_lidar
    lidar_to_camera3:
      translation: [ 0.02, -0.09, -0.33 ] # x, y, z in meters
      rotation_quaternion: [ 0.70462458,  0.00371959, -0.00492354, 0.70955347] # qx, qy, qz, qw (L to Cam)
      parent_frame:  oak_d_lr_right_rgb_camera_frame
      child_frame: os_lidar