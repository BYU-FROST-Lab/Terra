/**:
  ros__parameters:
    rosbag_path: /rosbag_path
    lidar_topic: /lio_sam/mapping/cloud_deskewed
    camera_topic: /oak/rgb/image_raw
    save_folder: /metric_map_data

    # extrinsic_transforms
    publish_extrinsics: false
    lidar_to_camera:
      translation: [ -0.15976, 0.0231164, 0.0319886 ] # x, y, z in meters
      rotation_quaternion: [ 0.999717, -0.00307403, -0.0236042, -0.0595019 ] # qx, qy, qz, qw
      parent_frame:  oak_rgb_camera_frame
      child_frame: os_lidar
