save_metric_data:
  ros__parameters:
    rosbag_path: /ros2_bags/holoocean_sim/dense18
    lidar_topic: /sphere_agent/points
    camera_topic: /sphere_agent/forward_image
    save_folder: /ros2_bags/holoocean_sim/dense18_metric_data

    # extrinsic_transforms
    publish_extrinsics: true
    lidar_to_camera:
      translation: [ 0.0, 0.0, 0.0 ] # x, y, z in meters
      rotation_quaternion: [ 0.5, -0.5, 0.5, 0.5 ] # qx, qy, qz, qw
      parent_frame:  os_sensor
      child_frame: os_lidar
